<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150">
  <!-- Tap ripples at fingertip -->
  <circle cx="50" cy="26" r="22" fill="none" stroke="#FF0000" stroke-width="2" opacity="0.2"/>
  <circle cx="50" cy="26" r="13" fill="none" stroke="#FF0000" stroke-width="2" opacity="0.45"/>
  <circle cx="50" cy="26" r="5" fill="#FF0000"/>

  <!-- Index finger -->
  <rect x="41" y="30" width="18" height="66" rx="9" fill="#1C1C1E"/>

  <!-- Middle finger (curled short) -->
  <rect x="61" y="72" width="15" height="26" rx="7.5" fill="#1C1C1E"/>

  <!-- Ring finger (curled short) -->
  <rect x="25" y="72" width="15" height="26" rx="7.5" fill="#1C1C1E"/>

  <!-- Palm -->
  <rect x="22" y="88" width="56" height="52" rx="14" fill="#1C1C1E"/>

  <!-- Thumb -->
  <ellipse cx="16" cy="103" rx="12" ry="8" fill="#1C1C1E" transform="rotate(-18 16 103)"/>
</svg>
